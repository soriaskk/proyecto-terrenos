<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Terrenos Chos Malal</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Terrenos <span>Chos Malal</span></a>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="terrenos.html">Terrenos</a></li>
                <li><a href="contactos.html">Contacto</a></li>
                <li><a href="login.html" style="color: #ffcc00;">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-box">
            <h2>Iniciar Sesión</h2>
            <p>Accedé a tu panel de vendedor</p>
            <form>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="usuario@email.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="boton-login">Ingresar</button>
                <a href="#" class="olvido">¿Olvidaste tu contraseña?</a>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Terrenos Chos Malal - Proyecto Escolar YPF</p>
    </footer>
</body>
</html>
